<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <h2>Signup</h2>
        <input type="text" id="signup-username" placeholder="Username" required>
        <input type="email" id="signup-email" placeholder="Email" required>
        <div class="password-input">
            <input type="password" id="signup-password" placeholder="Password" required>
        </div>
        
        <button onclick="signup()">Signup</button>
        <p id="signup-message" style="color: white;"></p>
        <br>
        <p>Already have an account? <a href="new.html">Login here</a></p>
        
        <button onclick="location.href='index1.html'">Back to Home</button>
    </div>

    <script>
        function signup() {
            const username = document.getElementById("signup-username").value;
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            const messageElement = document.getElementById("signup-message");
            
            if (!username || !email || !password) {
                messageElement.textContent = "Please fill in all fields.";
                messageElement.style.color = "red";
                return;
            }

            // Send signup request to backend
            fetch('http://localhost:5000/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message === 'Signup successful') {
                    messageElement.textContent = "Signup successful! Redirecting to login...";
                    messageElement.style.color = "white";
                    
                    // Redirect to login page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = "new.html";
                    }, 1500);
                } else {
                    messageElement.textContent = data.error || "An error occurred during signup.";
                    messageElement.style.color = "red";
                }
            })
            .catch(error => {
                messageElement.textContent = "An error occurred during signup.";
                messageElement.style.color = "red";
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
